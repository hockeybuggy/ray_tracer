# A white sphere lit by a warm light from the left and a cool light from
# the right, each casting its own shadow tinted by the opposite light's
# color. The same scene as the `multiple_lights` render test.
#
#     cargo run --release --bin render -- scenes/multiple_lights.toml [--scale N]

[scene]
name = "multiple_lights"
width = 100
height = 100

[camera]
field_of_view = 60.0
from = [0.0, 2.5, -7.0]
to = [0.0, 1.0, 0.0]
up = [0.0, 1.0, 0.0]

[[lights]]
position = [-8.0, 6.0, -6.0]
intensity = [0.8, 0.4, 0.3]

[[lights]]
position = [8.0, 6.0, -6.0]
intensity = [0.3, 0.4, 0.8]

[[objects]]
name = "floor"
kind = "plane"
material = { color = [1.0, 1.0, 1.0], specular = 0.0 }

[[objects]]
name = "ball"
kind = "sphere"
transform = [{ translate = [0.0, 1.0, 0.0] }]
material = { color = [0.9, 0.9, 0.9] }
