# The high-poly Utah teapot spinning 360 degrees in place.
#
# Render the frames, then assemble the gif:
#
#     cargo run --release --bin animate -- animations/teapot_spin.toml [--scale N]
#     ./scripts/make_gif.sh animations/frames/teapot_spin animations/teapot_spin.gif

[animation]
name = "teapot_spin"
width = 100
height = 75

[camera]
field_of_view = 60.0
from = [0.0, 2.0, -4.0]
to = [0.0, 0.7, 0.0]
up = [0.0, 1.0, 0.0]

[[lights]]
position = [-6.0, 8.0, -8.0]
intensity = [1.0, 1.0, 1.0]

[[objects]]
name = "floor"
kind = "plane"
material = { color = [0.55, 0.6, 0.65], specular = 0.0 }

# The model is built z-up and roughly 32 units wide: stand it up on the y
# axis and scale it down to about three units across.
[[objects]]
name = "teapot"
kind = "obj"
file = "object_files/teapot.obj"
transform = [{ rotate_x = -90.0 }, { scale = [0.1, 0.1, 0.1] }]


# Each frame turns the teapot a further 10 degrees about the y axis; the
# first frame is the base scene unchanged.
[[frames]]

[[frames]]
objects.teapot.transform = [{ rotate_y = 10.0 }]

[[frames]]
objects.teapot.transform = [{ rotate_y = 20.0 }]

[[frames]]
objects.teapot.transform = [{ rotate_y = 30.0 }]

